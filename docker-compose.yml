services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: storeapi_db
      POSTGRES_USER: storeapi_user
      POSTGRES_PASSWORD: storeapi_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storeapi_user -d storeapi_db"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "admin"
      MINIO_ROOT_PASSWORD: "password123"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 admin password123 &&
      mc mb --ignore-existing myminio/store-images &&
      mc anonymous set public myminio/store-images"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  storeapi:
    build:
      context: ./StoreAPI
      dockerfile: Dockerfile
    container_name: storeapi
    depends_on:
      db:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8082:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__PostgresDb=Host=db;Database=storeapi_db;Username=storeapi_user;Password=storeapi_pass
      - Rabbit__Host=rabbitmq
      - Rabbit__Port=5672
      - Rabbit__UserName=admin
      - Rabbit__Password=admin123
      - Jwt__Secret=StoreAPI-Dev-Secret-Key-Change-In-Production-Min32Chars
      - Jwt__Issuer=StoreAPI
      - Jwt__Audience=StoreAPIClients
      - Jwt__ExpiryMinutes=60
      - Minio__ServiceUrl=http://minio:9000
      - Minio__AccessKey=admin
      - Minio__SecretKey=password123
      - Elasticsearch__Url=http://elasticsearch:9200
  queuelistener:
    build:
      context: ./QueueListener
      dockerfile: Dockerfile
    container_name: queuelistener
    depends_on:
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8081:80"
    environment:
      - Rabbit__Host=rabbitmq
      - Rabbit__Port=5672
      - Rabbit__UserName=admin
      - Rabbit__Password=admin123
      - Elasticsearch__Url=http://elasticsearch:9200
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    depends_on:
      - storeapi
    ports:
      - "3000:80"

volumes:
  postgres_data:
  minio_data:
  elasticsearch_data:
  rabbitmq_data: