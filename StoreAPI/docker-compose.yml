services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: storeapi_db
      POSTGRES_USER: storeapi_user
      POSTGRES_PASSWORD: storeapi_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  rabbitmq:
    image: rabbitmq:3-management
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      # These set the actual RabbitMQ credentials
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin123
      # You can keep your custom ones if your C# code reads them, 
      # but RabbitMQ itself ignores them.
      - Rabbit__Host=rabbitmq 
      - Rabbit__Port=5672
      - Rabbit__UserName=store_admin
      - Rabbit__Password=supersecretpassword123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 5s
      retries: 5

  storeapi:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    ports:
      - "5000:80"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__PostgresDb: "Host=db;Database=storeapi_db;Username=storeapi_user;Password=storeapi_pass"

volumes:
  postgres_data:
  rabbitmq_data:
